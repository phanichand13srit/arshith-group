<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Arshit Group</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .dashboard-container {
            padding: 2rem 5%;
            background: #f8f9fa;
            min-height: 100vh;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .logout-btn {
            padding: 0.8rem 1.5rem;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .table-container {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 1.2rem;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f1f4f9;
            color: #333;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        tr:hover {
            background: #fdfdfd;
        }
        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            background: #e3f2fd;
            color: #0d47a1;
        }
        .view-btn {
            color: #007bff;
            text-decoration: none;
            font-weight: 500;
        }
        .view-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="light-mode">
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div>
                <h1 style="margin: 0; font-size: 1.8rem;">Admin <span style="color: #007bff;">Dashboard</span></h1>
                <p style="color: #666; margin: 0.2rem 0 0;">Managing Internship Applications</p>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </header>

        <div class="table-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="margin: 0; display: flex; align-items: center; gap: 0.75rem;">Recent Applications <span id="app-count-badge" style="font-size: 0.95rem; font-weight: 600; background: #e3f2fd; color: #0d47a1; padding: 0.25rem 0.75rem; border-radius: 100px; display: inline-flex; align-items: center; justify-content: center; box-shadow: inset 0 0 0 1px rgba(13,71,161,0.08);">0</span></h2>
                
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <label for="roleFilter" style="font-weight: 500; color: #666;">Filter by Role:</label>
                    <select id="roleFilter" onchange="filterByRole()" style="padding: 0.6rem; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer;">
                        <option value="all">All Roles</option>
                        <option value="Software & Web Development Intern - 3 Months">Software (3 Months)</option>
                        <option value="Software & Web Development Intern - 6 Months">Software (6 Months)</option>
                        <option value="E-Commerce Operations Intern - 3 Months">E-Commerce (3 Months)</option>
                        <option value="E-Commerce Operations Intern - 6 Months">E-Commerce (6 Months)</option>
                    </select>
                    <button onclick="fetchApplications()" style="padding: 0.6rem 1rem; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer;">Refresh</button>
                </div>
            </div>
            <table id="applications-table">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)" style="cursor: pointer;">Date ↕</th>
                        <th onclick="sortTable(1)" style="cursor: pointer;">Full Name ↕</th>
                        <th onclick="sortTable(2)" style="cursor: pointer;">Email ↕</th>
                        <th>Phone</th>
                        <th onclick="sortTable(4)" style="cursor: pointer;">Role ↕</th>
                        <th>Resume</th>
                        <th>Why Join?</th>
                    </tr>
                </thead>
                <tbody id="applications-body">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Check if logged in
        if (localStorage.getItem('isAdminLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('isAdminLoggedIn');
            window.location.href = 'login.html';
        }

        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:' 
            ? 'http://localhost:3000' 
            : '';

        let currentData = [];

        async function fetchApplications() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/applications`);
                currentData = await response.json();
                renderTable(currentData);
            } catch (error) {
                console.error('Error fetching applications:', error);
                alert('Failed to load applications. Is the server running?');
            }
        }

        function renderTable(data) {
            const body = document.getElementById('applications-body');
            body.innerHTML = '';

            // Update dynamic count badge reactively
            const countBadge = document.getElementById('app-count-badge');
            if (countBadge) {
                countBadge.textContent = data.length;
            }

            data.forEach(app => {
                const row = `
                    <tr>
                        <td>${new Date(app.created_at).toLocaleDateString()}</td>
                        <td style="font-weight: 600;">${app.full_name}</td>
                        <td>${app.email}</td>
                        <td>${app.phone}</td>
                        <td><span class="status-badge">${app.role}</span></td>
                        <td><a href="${API_BASE}/${app.resume_path}" target="_blank" class="view-btn">View PDF</a></td>
                        <td><div style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${app.why_join}">${app.why_join || 'N/A'}</div></td>
                    </tr>
                `;
                body.innerHTML += row;
            });
        }

        // Filtering Logic
        function filterByRole() {
            const filterValue = document.getElementById('roleFilter').value;
            if (filterValue === 'all') {
                renderTable(currentData);
            } else {
                // Exact match for the full role name
                const filtered = currentData.filter(app => app.role === filterValue);
                renderTable(filtered);
            }
        }

        // Interactive Sorting Function
        let sortDirection = true;
        function sortTable(columnIndex) {
            sortDirection = !sortDirection;
            const keys = ['created_at', 'full_name', 'email', '', 'role'];
            const key = keys[columnIndex];
            
            if (!key) return;

            currentData.sort((a, b) => {
                let valA = a[key] ? a[key].toString().toLowerCase() : '';
                let valB = b[key] ? b[key].toString().toLowerCase() : '';
                
                if (key === 'created_at') {
                    valA = new Date(a[key]);
                    valB = new Date(b[key]);
                }

                if (valA < valB) return sortDirection ? -1 : 1;
                if (valA > valB) return sortDirection ? 1 : -1;
                return 0;
            });

            renderTable(currentData);
        }

        // Load data on start
        fetchApplications();
    </script>
</body>
</html>
