<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Theme Hero Test</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #ffffff;
        }
        .hero-section {
            position: relative;
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 100px;
            overflow: hidden;
            background: radial-gradient(circle at top center, #0f172a, #020617);
        }
        body.light-mode .hero-section.has-parallax-bg {
            background: #f8fafc;
        }
        .intern-hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(3,7,18,0.75) 0%, rgba(3,7,18,0.45) 50%, rgba(3,7,18,0.85) 100%);
            z-index: 0;
            transition: background 0.4s ease;
            overflow: hidden;
        }
        body.light-mode .intern-hero-overlay {
            background: radial-gradient(circle at 50% 50%, #ffffff 0%, #f1f5f9 100%) !important;
        }
        .hero-floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        body.light-mode .hero-floating-elements {
            opacity: 1;
        }
        .floating-streak {
            position: absolute;
            bottom: 20px;
            width: 6px;
            height: 120px;
            background: linear-gradient(to top, rgba(139, 92, 246, 0) 0%, rgba(139, 92, 246, 0.2) 50%, rgba(139, 92, 246, 0) 100%);
            filter: blur(4px);
            border-radius: 100px;
        }
        .intern-hero-title {
            font-size: 3rem;
            color: #ffffff;
            transition: color 0.4s ease;
            margin-bottom: 1rem;
        }
        body.light-mode .intern-hero-title {
            color: #0f172a !important;
        }
        .intern-hero-desc {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            transition: color 0.4s ease;
        }
        body.light-mode .intern-hero-desc {
            color: #334155 !important;
        }
    </style>
</head>
<body class="light-mode">
    <section class="hero-section has-parallax-bg">
        <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: url('https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=1600&q=80') no-repeat center center/cover; transform: scale(1.05); z-index: -2;" id="hero-bg-parallax"></div>
        <div class="intern-hero-overlay">
            <div class="hero-floating-elements">
                <span class="floating-streak" style="left: 10%;"></span>
                <span class="floating-streak" style="left: 30%; background: linear-gradient(to top, rgba(226, 232, 240, 0) 0%, rgba(226, 232, 240, 0.6) 50%, rgba(226, 232, 240, 0) 100%);"></span>
                <span class="floating-streak" style="left: 60%;"></span>
            </div>
        </div>
        <div class="hero-content" style="z-index: 1; max-width: 800px; margin: 0 auto;">
            <h1 class="intern-hero-title">Full-Stack Dev Pro</h1>
            <p class="intern-hero-desc">Deep dive into full-stack software architectures.</p>
        </div>
    </section>
</body>
</html>
